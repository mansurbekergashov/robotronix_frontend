# Frontend jamoasi uchun — barcha 3 ta frontend
#
# Serverda backend bilan ishlash (tavsiya):
#   docker-compose up               # .env da BACKEND_URL=https://robotronix.uz
#
# Lokal backend bilan ishlash:
#   cd ../backend && docker-compose up -d
#   docker-compose up               # .env da BACKEND_URL=http://backend:8080
#
# Portlar:
#   Main:  http://localhost:3000
#   Admin: http://localhost:3001
#   User:  http://localhost:3002

services:
  frontend:
    build: ./main
    container_name: robotronix-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=${BACKEND_URL:-https://robotronix.uz}
      - BACKEND_WS_URL=${BACKEND_WS_URL:-wss://robotronix.uz}
    networks:
      - robotronix-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin-frontend:
    build: ./admin
    container_name: robotronix-admin-frontend
    restart: always
    ports:
      - "3001:80"
    environment:
      - BACKEND_URL=${BACKEND_URL:-https://robotronix.uz}
      - BACKEND_WS_URL=${BACKEND_WS_URL:-wss://robotronix.uz}
    networks:
      - robotronix-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  user-frontend:
    build: ./user
    container_name: robotronix-user-frontend
    restart: always
    ports:
      - "3002:80"
    environment:
      - BACKEND_URL=${BACKEND_URL:-https://robotronix.uz}
      - BACKEND_WS_URL=${BACKEND_WS_URL:-wss://robotronix.uz}
    networks:
      - robotronix-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  robotronix-network:
    name: robotronix-network
    driver: bridge
