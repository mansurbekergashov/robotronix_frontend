<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- Circuit Pattern (Subtle) -->
  <path d="M 0 50 L 150 50 L 200 100 L 800 100 M 0 450 L 250 450 L 300 400 L 800 400" stroke="#334155" stroke-width="2" fill="none" />
  <circle cx="150" cy="50" r="4" fill="#3b82f6" />
  <circle cx="200" cy="100" r="4" fill="#3b82f6" />
  <circle cx="250" cy="450" r="4" fill="#3b82f6" />
  <circle cx="300" cy="400" r="4" fill="#3b82f6" />

  <!-- Center Group -->
  <g transform="translate(400, 230)">
    <!-- Outer Glow Circle -->
    <circle cx="0" cy="0" r="120" fill="url(#glowGrad)" filter="url(#glow)"/>
    <!-- Tech Rings -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1e293b" stroke-width="15"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#primaryGrad)" stroke-width="15" stroke-dasharray="120 40 60 40"/>
    
    <!-- Robot Core/Brain Icon -->
    <path d="M-40,-30 H40 A20,20 0 0,1 60,-10 V30 A20,20 0 0,1 40,50 H-40 A20,20 0 0,1 -60,30 V-10 A20,20 0 0,1 -40,-30 Z" fill="#1e293b" stroke="#3b82f6" stroke-width="6"/>
    <circle cx="-25" cy="-5" r="12" fill="#60a5fa"/>
    <circle cx="25" cy="-5" r="12" fill="#60a5fa"/>
    <rect x="-20" y="25" width="40" height="6" rx="3" fill="#64748b"/>
    <path d="M0,-30 V-55 M-15,-55 H15" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="-65" r="8" fill="#ef4444" filter="url(#glow)"/>
  </g>

  <!-- Text -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="4">ROBOTRONIX</text>
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" letter-spacing="2">DEFAULT IMAGE</text>
</svg>
